name: nightly

on:
  schedule:
    # ~1 hour after upstream's nightly (which starts at 11:45 PM US Pacific).
    # 08:45 UTC = 12:45 AM PST (+1h) / 01:45 AM PDT (+2h) — always after upstream.
    # (cron is fixed UTC and does not follow DST.) Scheduled runs only fire on the
    # default branch and may be delayed under GitHub load.
    - cron: '45 8 * * *'
  workflow_dispatch:
    inputs:
      revs:
        description: 'Specific changeset short-hashes to build (space-separated). Empty = auto-detect unbuilt revs.'
        required: false
        default: ''
      max:
        description: 'Max number of unbuilt revs to build in one run (backlog cap).'
        required: false
        default: '10'

permissions:
  contents: write

env:
  # Recent clang (19+) and Apple clang promote several legacy C warnings to errors
  # by default. Upstream compiles cleanly on older clang, so downgrade just those
  # back to warnings (no source changes). Harmless for gcc/mingw.
  CWARN: '-Wno-error=incompatible-pointer-types -Wno-error=incompatible-function-pointer-types -Wno-error=int-conversion -Wno-error=implicit-int'
  # GCC has no -Wincompatible-function-pointer-types (clang-only); use a GCC-safe subset.
  CWARN_GCC: '-Wno-error=incompatible-pointer-types -Wno-error=int-conversion -Wno-error=implicit-int'
  SDL_WIN_VER: '2.30.9'
  GLEW_WIN_VER: '2.2.0'

jobs:
  # ---------------------------------------------------------------------------
  # Detect every recent changeset that does not yet have a `nightly-<node>`
  # release, fetch ONLY those via lightweight hgweb HTTP (no `hg clone`), and
  # publish a per-rev source tarball + release-notes markdown as an artifact.
  #
  # Low upstream load by design:
  #   * one small JSON request per run (`/json-log`, a few KB) to find new revs
  #   * a ~2 MB `/archive/<rev>.tar.gz` ONLY for genuinely new revs (often none)
  # No full-history clone is ever performed. State ("what's built") lives in the
  # GitHub release tags, so nothing extra needs to be mirrored.
  # ---------------------------------------------------------------------------
  coordinate:
    runs-on: ubuntu-latest
    env:
      HGWEB: https://www.retrodev.com/repos/blastem
      UA: 'blastem-builds-ci (+https://github.com/ulalume/blastem-builds)'
    outputs:
      revs: ${{ steps.detect.outputs.revs }}
      has_work: ${{ steps.detect.outputs.has_work }}
    steps:
      - name: Detect unbuilt revisions (hgweb, no clone)
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          MANUAL: ${{ github.event.inputs.revs }}
          MAXIN: ${{ github.event.inputs.max }}
        run: |
          set -euo pipefail
          gh release list --repo "$REPO" --limit 1000 --json tagName -q '.[].tagName' \
            > /tmp/tags.txt 2>/dev/null || true
          mkdir -p sources
          cat > /tmp/detect.py <<'PY'
          import json, os, sys, time, datetime, urllib.request
          HGWEB = os.environ['HGWEB']
          UA = os.environ['UA']
          def get(path):
              last = None
              for attempt in range(4):
                  try:
                      req = urllib.request.Request(HGWEB + path, headers={'User-Agent': UA})
                      with urllib.request.urlopen(req, timeout=60) as r:
                          return json.loads(r.read().decode())
                  except Exception as e:
                      last = e
                      print(f'fetch {path} attempt {attempt+1} failed: {e}', file=sys.stderr)
                      time.sleep(15 * (attempt + 1))
              raise last
          built = set()
          try:
              for line in open('/tmp/tags.txt'):
                  line = line.strip()
                  if line.startswith('nightly-'):
                      built.add(line[len('nightly-'):])
          except FileNotFoundError:
              pass
          manual = os.environ.get('MANUAL', '').split()
          try:
              cap = int(os.environ.get('MAXIN') or '10')
          except ValueError:
              cap = 10
          def short(n):
              return n[:12]
          def isodate(dt):
              ts, tz = dt[0], int(dt[1])
              local = datetime.datetime.fromtimestamp(ts - tz, datetime.timezone.utc)
              sign = '-' if tz >= 0 else '+'
              mins = abs(tz) // 60
              return local.strftime('%Y-%m-%d %H:%M:%S') + f' {sign}{mins//60:02d}{mins%60:02d}'
          todo = []  # (short_node, user, desc, date)
          if manual:
              for n in manual:
                  d = get('/json-rev/' + n)
                  todo.append((short(d['node']), d.get('user', ''), d.get('desc', ''), d.get('date', [0, 0])))
          else:
              cs = get('/json-log').get('changesets', [])  # newest first (latest ~10)
              for e in cs:
                  s = short(e['node'])
                  if s in built:
                      break
                  todo.append((s, e.get('user', ''), e.get('desc', ''), e.get('date', [0, 0])))
                  if len(todo) >= cap:
                      print(f'::warning::Reached cap of {cap} revs this run.', file=sys.stderr)
                      break
              else:
                  if cs and len(todo) == len(cs):
                      print(f'::warning::All {len(cs)} returned changesets are unbuilt; '
                            f'auto-detect window is ~{len(cs)} revs. Build older revs via the '
                            f'manual "revs" input if needed.', file=sys.stderr)
              todo.reverse()  # chronological (oldest first)
          revs, nodes = [], []
          for s, user, desc, dt in todo:
              with open(f'sources/body-{s}.md', 'w') as f:
                  f.write(f'Unofficial automated build of BlastEm at upstream changeset '
                          f'[`{s}`]({HGWEB}/rev/{s}).\n\n')
                  f.write(f'- **Author:** {user}\n')
                  f.write(f'- **Date:** {isodate(dt)}\n')
                  f.write(f'- **Changeset:** [`{s}`]({HGWEB}/rev/{s})\n\n')
                  f.write('**Commit message**\n\n```\n' + desc.rstrip() + '\n```\n\n')
                  f.write('---\nSource is unmodified upstream. BlastEm is GPLv3, created by Michael Pavone.\n')
              revs.append({'node': s})
              nodes.append(s)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write('revs=' + json.dumps(revs) + '\n')
              out.write('has_work=' + ('true' if revs else 'false') + '\n')
          with open('/tmp/todo.txt', 'w') as f:
              f.write(''.join(n + '\n' for n in nodes))
          print('Revisions to build:', json.dumps(revs), file=sys.stderr)
          PY
          python3 /tmp/detect.py

      - name: Fetch sources for unbuilt revs (hgweb archive)
        if: steps.detect.outputs.has_work == 'true'
        run: |
          set -euo pipefail
          while read -r node || [ -n "$node" ]; do
            [ -n "$node" ] || continue
            curl -fSL -A "$UA" --retry 5 --retry-delay 15 --retry-all-errors --max-time 180 \
              -o raw.tgz "$HGWEB/archive/$node.tar.gz"
            rm -rf repack && mkdir -p repack/src
            tar xzf raw.tgz -C repack/src --strip-components=1
            tar czf "sources/src-$node.tgz" -C repack src
            echo "fetched + repacked $node"
          done < /tmp/todo.txt
          ls -la sources

      - name: Upload sources artifact
        if: steps.detect.outputs.has_work == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sources
          path: |
            sources/*.tgz
            sources/*.md
          retention-days: 2

  # ---------------------------------------------------------------------------
  # WebAssembly (WebGL).
  # ---------------------------------------------------------------------------
  wasm:
    needs: coordinate
    if: needs.coordinate.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rev: ${{ fromJSON(needs.coordinate.outputs.revs) }}
    steps:
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y zip fonts-dejavu-core
      - name: Setup emscripten
        uses: mymindstorm/setup-emsdk@v14
      - name: Download sources
        uses: actions/download-artifact@v4
        with:
          name: sources
      - name: Extract source @ ${{ matrix.rev.node }}
        run: |
          set -euo pipefail
          tar xzf "src-${{ matrix.rev.node }}.tgz"
          sed -i -E "s/(define BLASTEM_VERSION \"[^-]+)-pre\"/\1-pre-${{ matrix.rev.node }}\"/" src/version.inc || true
      - name: Build (wasm)
        working-directory: src
        run: |
          set -euo pipefail
          # Upstream embeds DroidSans.ttf at link time but the font is not in the repo.
          # font_web.c loads it by literal name, so any TrueType font works.
          cp /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf DroidSans.ttf
          make CC=emcc CPU=wasm m68k.c z80.c
          make CC="emcc $CWARN" CPU=wasm blastem.html
      - name: Package
        working-directory: src
        run: |
          set -euo pipefail
          ver=$(sed -E -n 's/^[^B]+BLASTEM_VERSION "([^"]+)"/\1/p' version.inc)
          dir="blastem-wasm-${ver}"
          mkdir "$dir"
          for f in blastem.html blastem.js blastem.wasm blastem.data; do
            [ -f "$f" ] && cp "$f" "$dir"/ || true
          done
          cp blastem.html "$dir"/index.html
          cp COPYING "$dir"/COPYING
          zip -r "${dir}.zip" "$dir"
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ matrix.rev.node }}
          name: BlastEm nightly ${{ matrix.rev.node }}
          prerelease: true
          body_path: body-${{ matrix.rev.node }}.md
          files: src/blastem-wasm-*.zip
          fail_on_unmatched_files: true

  # ---------------------------------------------------------------------------
  # macOS Universal .app, built entirely on an Apple Silicon runner (no Intel
  # runner). SDL2 + GLEW are built as universal (arm64+x86_64) from source so
  # blastem can be compiled for both arches and lipo'd into one binary.
  # ---------------------------------------------------------------------------
  macos:
    needs: coordinate
    if: needs.coordinate.outputs.has_work == 'true'
    runs-on: macos-14
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        rev: ${{ fromJSON(needs.coordinate.outputs.revs) }}
    steps:
      - name: Checkout this repo (for assets)
        uses: actions/checkout@v4
        with:
          path: ci
      - name: Install tools
        run: brew install cmake pkg-config dylibbundler
      - name: Download sources
        uses: actions/download-artifact@v4
        with:
          name: sources
      - name: Extract source @ ${{ matrix.rev.node }}
        run: |
          set -euo pipefail
          tar xzf "src-${{ matrix.rev.node }}.tgz"
          sed -i '' -E "s/(define BLASTEM_VERSION \"[^-]+)-pre\"/\1-pre-${{ matrix.rev.node }}\"/" src/version.inc || true

      - name: Build universal SDL2 + GLEW (arm64 + x86_64)
        run: |
          set -euo pipefail
          UNIV="$PWD/univ"; mkdir -p "$UNIV/lib/pkgconfig"
          ARCHS="arm64;x86_64"
          # SDL2 (universal) via CMake
          curl -fSL -o sdl.tar.gz "https://github.com/libsdl-org/SDL/releases/download/release-${SDL_WIN_VER}/SDL2-${SDL_WIN_VER}.tar.gz"
          mkdir sdlsrc && tar xzf sdl.tar.gz -C sdlsrc --strip-components=1
          cmake -S sdlsrc -B sdlbuild -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="$ARCHS" -DCMAKE_INSTALL_PREFIX="$UNIV" \
            -DSDL_SHARED=ON -DSDL_STATIC=OFF -DSDL_TEST=OFF
          cmake --build sdlbuild --config Release -j3
          cmake --install sdlbuild
          # GLEW (universal) via its Makefile
          curl -fSL -o glew.tgz "https://github.com/nigels-com/glew/releases/download/glew-${GLEW_WIN_VER}/glew-${GLEW_WIN_VER}.tgz"
          mkdir glewsrc && tar xzf glew.tgz -C glewsrc --strip-components=1
          # STRIP=true: skip `strip`, which rejects fat (universal) objects inside a .a archive.
          make -C glewsrc GLEW_DEST="$UNIV" 'CFLAGS.EXTRA=-arch arm64 -arch x86_64' 'LDFLAGS.EXTRA=-arch arm64 -arch x86_64' STRIP=true all
          make -C glewsrc GLEW_DEST="$UNIV" STRIP=true install.all
          # Deterministic glew.pc (do not depend on GLEW's installer details).
          printf 'prefix=%s\nlibdir=${prefix}/lib\nincludedir=${prefix}/include\nName: glew\nDescription: GLEW\nVersion: %s\nCflags: -I${includedir}\nLibs: -L${libdir} -lGLEW -framework OpenGL\n' \
            "$UNIV" "${GLEW_WIN_VER}" > "$UNIV/lib/pkgconfig/glew.pc"
          echo "UNIV=$UNIV" >> "$GITHUB_ENV"
          echo "=== universal dep check ==="; lipo -info "$UNIV"/lib/libSDL2*.dylib "$UNIV"/lib/libGLEW*.dylib || true

      - name: Build blastem (arm64 + x86_64) and lipo
        working-directory: src
        run: |
          set -euo pipefail
          export PKG_CONFIG_PATH="$UNIV/lib/pkgconfig"
          # arm64 — NEW_CORE interpreter (default CPU on this host)
          rm -rf obj blastem
          make CC="clang -arch arm64 $CWARN" blastem
          mv blastem ../blastem-arm64
          # x86_64 — JIT
          rm -rf obj blastem
          make CPU=x86_64 CC="clang -arch x86_64 $CWARN" blastem
          mv blastem ../blastem-x86_64
          lipo -create ../blastem-arm64 ../blastem-x86_64 -output blastem
          lipo -info blastem

      - name: Assemble Universal .app
        working-directory: src
        run: |
          set -euo pipefail
          ver=$(sed -E -n 's/^[^B]+BLASTEM_VERSION "([^"]+)"/\1/p' version.inc)
          APP="BlastEm.app"; rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Frameworks" "$APP/Contents/Resources"
          cp blastem "$APP/Contents/MacOS/"
          cp -R shaders images default.cfg rom.db gamecontrollerdb.txt systems.cfg COPYING "$APP/Contents/MacOS/"
          cp ../ci/assets/BlastEm.icns "$APP/Contents/Resources/BlastEm.icns"
          # Bundle the (universal) SDL2/GLEW dylibs into the app and fix install names.
          dylibbundler -od -b -x "$APP/Contents/MacOS/blastem" \
            -d "$APP/Contents/Frameworks" -p "@executable_path/../Frameworks/"
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>BlastEm</string>
            <key>CFBundleDisplayName</key><string>BlastEm</string>
            <key>CFBundleIdentifier</key><string>com.retrodev.blastem.unofficial</string>
            <key>CFBundleVersion</key><string>${ver}</string>
            <key>CFBundleShortVersionString</key><string>${ver}</string>
            <key>CFBundleExecutable</key><string>blastem</string>
            <key>CFBundleIconFile</key><string>BlastEm</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>10.13</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          PLIST
          codesign --force --deep -s - "$APP" || true
          echo "=== universal binary ==="; lipo -info "$APP/Contents/MacOS/blastem"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "BlastEm-macOS-${ver}.zip"
          ls -la "BlastEm-macOS-${ver}.zip"

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ matrix.rev.node }}
          name: BlastEm nightly ${{ matrix.rev.node }}
          prerelease: true
          body_path: body-${{ matrix.rev.node }}.md
          files: src/BlastEm-macOS-*.zip
          fail_on_unmatched_files: true

  # ---------------------------------------------------------------------------
  # Linux x86_64 (JIT) and arm64 (interpreter), native runners.
  # Portable: bundle libSDL2/libGLEW next to the binary with $ORIGIN/lib rpath.
  # ---------------------------------------------------------------------------
  linux:
    needs: coordinate
    if: needs.coordinate.outputs.has_work == 'true'
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        rev: ${{ fromJSON(needs.coordinate.outputs.revs) }}
        arch: [x86_64, arm64]
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 libsdl2-dev libglew-dev zlib1g-dev patchelf zip file
      - name: Download sources
        uses: actions/download-artifact@v4
        with:
          name: sources
      - name: Extract source @ ${{ matrix.rev.node }}
        run: |
          set -euo pipefail
          tar xzf "src-${{ matrix.rev.node }}.tgz"
          sed -i -E "s/(define BLASTEM_VERSION \"[^-]+)-pre\"/\1-pre-${{ matrix.rev.node }}\"/" src/version.inc || true
      - name: Build (${{ matrix.arch }})
        working-directory: src
        run: |
          set -euo pipefail
          make CC="gcc $CWARN_GCC" blastem
          file blastem
      - name: Package (portable)
        working-directory: src
        run: |
          set -euo pipefail
          ver=$(sed -E -n 's/^[^B]+BLASTEM_VERSION "([^"]+)"/\1/p' version.inc)
          dir="blastem-linux-${{ matrix.arch }}-${ver}"
          mkdir -p "$dir/lib"
          cp blastem "$dir/"
          cp -r shaders images default.cfg rom.db gamecontrollerdb.txt systems.cfg COPYING "$dir/"
          # Bundle the non-system libraries (SDL2, GLEW); leave GL/X/audio to the host.
          ldd blastem | awk '/libSDL2|libGLEW/ {print $3}' | while read -r p; do
            [ -n "$p" ] && cp -Lv "$p" "$dir/lib/"
          done
          patchelf --set-rpath '$ORIGIN/lib' "$dir/blastem"
          tar czf "${dir}.tar.gz" "$dir"
          ls -la "${dir}.tar.gz"
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ matrix.rev.node }}
          name: BlastEm nightly ${{ matrix.rev.node }}
          prerelease: true
          body_path: body-${{ matrix.rev.node }}.md
          files: src/blastem-linux-*.tar.gz
          fail_on_unmatched_files: true

  # ---------------------------------------------------------------------------
  # Windows x86_64 and x86 (32-bit), cross-compiled with mingw-w64 (as upstream).
  # ---------------------------------------------------------------------------
  windows:
    needs: coordinate
    if: needs.coordinate.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rev: ${{ fromJSON(needs.coordinate.outputs.revs) }}
        arch: [x86_64, i686]
    steps:
      - name: Install mingw + tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 python3 zip unzip wget
      - name: Download sources
        uses: actions/download-artifact@v4
        with:
          name: sources
      - name: Extract source @ ${{ matrix.rev.node }}
        run: |
          set -euo pipefail
          tar xzf "src-${{ matrix.rev.node }}.tgz"
          sed -i -E "s/(define BLASTEM_VERSION \"[^-]+)-pre\"/\1-pre-${{ matrix.rev.node }}\"/" src/version.inc || true
      - name: Fetch Windows SDL2 + GLEW dev libraries
        working-directory: src
        run: |
          set -euo pipefail
          wget -q "https://github.com/libsdl-org/SDL/releases/download/release-${SDL_WIN_VER}/SDL2-devel-${SDL_WIN_VER}-mingw.tar.gz"
          mkdir sdl && tar xzf "SDL2-devel-${SDL_WIN_VER}-mingw.tar.gz" -C sdl --strip-components=1
          wget -q "https://github.com/nigels-com/glew/releases/download/glew-${GLEW_WIN_VER}/glew-${GLEW_WIN_VER}-win32.zip"
          unzip -q "glew-${GLEW_WIN_VER}-win32.zip"
          mv "glew-${GLEW_WIN_VER}" glew
      - name: Build (${{ matrix.arch }})
        working-directory: src
        run: |
          set -euo pipefail
          make PORTABLE=1 OS=Windows CPU=${{ matrix.arch }} SDL=sdl2 blastem.exe
          file blastem.exe
      - name: Package
        working-directory: src
        run: |
          set -euo pipefail
          ver=$(sed -E -n 's/^[^B]+BLASTEM_VERSION "([^"]+)"/\1/p' version.inc)
          if [ "${{ matrix.arch }}" = "x86_64" ]; then triple=x86_64-w64-mingw32; suffix=win64; else triple=i686-w64-mingw32; suffix=win32; fi
          dir="blastem-${suffix}-${ver}"
          mkdir "$dir"
          cp blastem.exe "$dir/"
          cp "sdl/${triple}/bin/SDL2.dll" "$dir/"
          cp -r shaders images default.cfg rom.db gamecontrollerdb.txt systems.cfg "$dir/"
          cp COPYING "$dir/COPYING.txt"
          zip -r "${dir}.zip" "$dir"
          ls -la "${dir}.zip"
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ matrix.rev.node }}
          name: BlastEm nightly ${{ matrix.rev.node }}
          prerelease: true
          body_path: body-${{ matrix.rev.node }}.md
          files: src/blastem-win*.zip
          fail_on_unmatched_files: true
