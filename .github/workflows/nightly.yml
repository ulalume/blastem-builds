name: nightly

on:
  schedule:
    # Daily at 18:00 UTC. Scheduled runs only fire on the default branch.
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      revs:
        description: 'Specific changeset short-hashes to build (space-separated). Empty = auto-detect unbuilt revs.'
        required: false
        default: ''
      max:
        description: 'Max number of unbuilt revs to build in one run (backlog cap).'
        required: false
        default: '10'

permissions:
  contents: write

env:
  HG_URL: https://www.retrodev.com/repos/blastem

jobs:
  # ---------------------------------------------------------------------------
  # Clone upstream ONCE, detect every changeset that does not yet have a
  # `nightly-<node>` release (oldest-first, capped), and publish a per-rev
  # source tarball as an artifact for the build jobs to consume. Cloning once
  # here (instead of in every build job) avoids hammering upstream / 403s.
  # ---------------------------------------------------------------------------
  coordinate:
    runs-on: ubuntu-latest
    outputs:
      revs: ${{ steps.detect.outputs.revs }}
      has_work: ${{ steps.detect.outputs.has_work }}
    steps:
      - name: Install mercurial
        run: sudo apt-get update && sudo apt-get install -y mercurial

      - name: Clone upstream
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            hg clone -U "$HG_URL" upstream && break
            echo "clone attempt $i failed; retrying in 20s..." >&2
            sleep 20
          done
          [ -d upstream/.hg ] || { echo "::error::Failed to clone upstream"; exit 1; }

      - name: Detect unbuilt revisions
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          MANUAL: ${{ github.event.inputs.revs }}
          MAXIN: ${{ github.event.inputs.max }}
        run: |
          set -euo pipefail
          gh release list --repo "$REPO" --limit 1000 --json tagName -q '.[].tagName' \
            > /tmp/tags.txt 2>/dev/null || true
          hg -R upstream log -r 'reverse(0:tip)' --template '{node|short}\n' > /tmp/nodes.txt

          cat > /tmp/detect.py <<'PY'
          import json, os, sys
          built = set()
          try:
              for line in open('/tmp/tags.txt'):
                  line = line.strip()
                  if line.startswith('nightly-'):
                      built.add(line[len('nightly-'):])
          except FileNotFoundError:
              pass
          nodes = [l.strip() for l in open('/tmp/nodes.txt') if l.strip()]  # newest first
          manual = os.environ.get('MANUAL', '').split()
          try:
              cap = int(os.environ.get('MAXIN') or '10')
          except ValueError:
              cap = 10
          if manual:
              todo = manual
          else:
              todo = []
              for n in nodes:
                  if n in built:
                      break
                  todo.append(n)
                  if len(todo) >= cap:
                      print(f"::warning::Reached cap of {cap} unbuilt revs; "
                            f"older unbuilt revs will be built on later runs.", file=sys.stderr)
                      break
              todo.reverse()  # chronological (oldest first)
          revs = [{"node": n} for n in todo]
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write("revs=" + json.dumps(revs) + "\n")
              out.write("has_work=" + ("true" if revs else "false") + "\n")
          with open('/tmp/todo.txt', 'w') as f:
              f.write("".join(n + "\n" for n in todo))
          print("Revisions to build:", json.dumps(revs), file=sys.stderr)
          PY
          python3 /tmp/detect.py

      - name: Archive sources and release notes
        if: steps.detect.outputs.has_work == 'true'
        run: |
          set -euo pipefail
          mkdir -p sources
          while read -r n || [ -n "$n" ]; do
            [ -n "$n" ] || continue
            hg archive -R upstream -r "$n" -t tgz -p src "sources/src-$n.tgz"
            author=$(hg -R upstream log -r "$n" --template '{author}')
            cdate=$(hg -R upstream log -r "$n" --template '{date|isodate}')
            hg -R upstream log -r "$n" --template '{desc}' > /tmp/desc.txt
            {
              echo "Unofficial automated build of BlastEm at upstream changeset [\`$n\`](https://www.retrodev.com/repos/blastem/rev/$n)."
              echo
              echo "- **Author:** $author"
              echo "- **Date:** $cdate"
              echo "- **Changeset:** [\`$n\`](https://www.retrodev.com/repos/blastem/rev/$n)"
              echo
              echo "**Commit message**"
              echo
              echo '```'
              cat /tmp/desc.txt
              echo
              echo '```'
              echo
              echo "---"
              echo "Source is unmodified upstream. BlastEm is GPLv3, created by Michael Pavone."
            } > "sources/body-$n.md"
            echo "prepared $n"
          done < /tmp/todo.txt
          ls -la sources

      - name: Upload sources artifact
        if: steps.detect.outputs.has_work == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sources
          path: |
            sources/*.tgz
            sources/*.md
          retention-days: 2

  # ---------------------------------------------------------------------------
  # Job 1: WebAssembly (WebGL) build.
  # ---------------------------------------------------------------------------
  wasm:
    needs: coordinate
    if: needs.coordinate.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rev: ${{ fromJSON(needs.coordinate.outputs.revs) }}
    steps:
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y zip fonts-dejavu-core

      - name: Setup emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Download sources
        uses: actions/download-artifact@v4
        with:
          name: sources

      - name: Extract source @ ${{ matrix.rev.node }}
        run: |
          set -euo pipefail
          tar xzf "src-${{ matrix.rev.node }}.tgz"
          # Version stamp (CI-only) — mirrors upstream nightly behaviour.
          sed -i -E "s/(define BLASTEM_VERSION \"[^-]+)-pre\"/\1-pre-${{ matrix.rev.node }}\"/" src/version.inc || true

      - name: Build (wasm)
        working-directory: src
        run: |
          set -euo pipefail
          # Recent emscripten/clang (19+) promotes several legacy C warnings to errors
          # by default. Upstream compiles cleanly on older clang, so downgrade just those
          # back to warnings via CC flags (no source changes).
          EMCC="emcc -Wno-error=incompatible-pointer-types -Wno-error=incompatible-function-pointer-types -Wno-error=int-conversion -Wno-error=implicit-int"
          # Upstream embeds DroidSans.ttf at link time, but the font is not in the repo.
          # font_web.c loads it by literal name, so any TrueType font works. DejaVuSans
          # (from apt, permissively licensed) is supplied under that name.
          cp /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf DroidSans.ttf
          # Generate the CPU cores first (heavy single translation units) to keep memory sane.
          make CC=emcc CPU=wasm m68k.c z80.c
          make CC="$EMCC" CPU=wasm blastem.html

      - name: Package
        working-directory: src
        run: |
          set -euo pipefail
          ver=$(sed -E -n 's/^[^B]+BLASTEM_VERSION "([^"]+)"/\1/p' version.inc)
          dir="blastem-wasm-${ver}"
          mkdir "$dir"
          for f in blastem.html blastem.js blastem.wasm blastem.data; do
            [ -f "$f" ] && cp "$f" "$dir"/ || true
          done
          cp blastem.html "$dir"/index.html
          cp COPYING "$dir"/COPYING
          zip -r "${dir}.zip" "$dir"
          ls -la "${dir}.zip"

      - name: Publish to release nightly-${{ matrix.rev.node }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ matrix.rev.node }}
          name: BlastEm nightly ${{ matrix.rev.node }}
          prerelease: true
          body_path: body-${{ matrix.rev.node }}.md
          files: src/blastem-wasm-*.zip
          fail_on_unmatched_files: true

  # ---------------------------------------------------------------------------
  # Job 2: macOS Apple Silicon (.app, self-contained via dylibbundler).
  # (Intel + Universal lipo will be added next.)
  # ---------------------------------------------------------------------------
  macos-arm64:
    needs: coordinate
    if: needs.coordinate.outputs.has_work == 'true'
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        rev: ${{ fromJSON(needs.coordinate.outputs.revs) }}
    steps:
      - name: Install dependencies
        run: brew install sdl2 glew pkg-config dylibbundler

      - name: Download sources
        uses: actions/download-artifact@v4
        with:
          name: sources

      - name: Extract source @ ${{ matrix.rev.node }}
        run: |
          set -euo pipefail
          tar xzf "src-${{ matrix.rev.node }}.tgz"
          # BSD sed needs an explicit (empty) backup suffix.
          sed -i '' -E "s/(define BLASTEM_VERSION \"[^-]+)-pre\"/\1-pre-${{ matrix.rev.node }}\"/" src/version.inc || true

      - name: Build (arm64)
        working-directory: src
        run: |
          set -euo pipefail
          # Same legacy-C warning downgrade as wasm (Apple clang also defaults some to errors).
          CCFLAGS="-Wno-error=incompatible-pointer-types -Wno-error=incompatible-function-pointer-types -Wno-error=int-conversion -Wno-error=implicit-int"
          make CC="cc $CCFLAGS" blastem
          file blastem

      - name: Assemble .app
        working-directory: src
        run: |
          set -euo pipefail
          ver=$(sed -E -n 's/^[^B]+BLASTEM_VERSION "([^"]+)"/\1/p' version.inc)
          APP="BlastEm.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Frameworks"
          # blastem reads its data files from the executable's directory.
          cp blastem "$APP/Contents/MacOS/"
          cp -R shaders images default.cfg rom.db gamecontrollerdb.txt systems.cfg COPYING "$APP/Contents/MacOS/"
          # Bundle non-system dylibs (SDL2, GLEW, ...) into the app and rewrite install names.
          dylibbundler -od -b -x "$APP/Contents/MacOS/blastem" \
            -d "$APP/Contents/Frameworks" -p "@executable_path/../Frameworks/"
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>BlastEm</string>
            <key>CFBundleDisplayName</key><string>BlastEm</string>
            <key>CFBundleIdentifier</key><string>com.retrodev.blastem.unofficial</string>
            <key>CFBundleVersion</key><string>${ver}</string>
            <key>CFBundleShortVersionString</key><string>${ver}</string>
            <key>CFBundleExecutable</key><string>blastem</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>10.13</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          PLIST
          # Ad-hoc signature so the bundle is internally consistent (still "unidentified").
          codesign --force --deep -s - "$APP" || true
          out="BlastEm-macOS-arm64-${ver}"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "${out}.zip"
          ls -la "${out}.zip"

      - name: Publish to release nightly-${{ matrix.rev.node }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ matrix.rev.node }}
          name: BlastEm nightly ${{ matrix.rev.node }}
          prerelease: true
          body_path: body-${{ matrix.rev.node }}.md
          files: src/BlastEm-macOS-arm64-*.zip
          fail_on_unmatched_files: true
